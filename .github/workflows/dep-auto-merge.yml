name: 🤖 dep auto merge

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: projectdiscovery/actions/pr/approve@v1
      - uses: projectdiscovery/actions/pr/merge@v1
        with:
          auto: false
